services:
    - type: web
      name: anamaliya
      runtime: python
      buildCommand: pip install -r requirements.txt
      startCommand: PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0
  --port $PORT
      envVars:
        - key: PYTHON_VERSION
          value: 3.11.9
        - key: APP_ENV
          value: production
        - key: APP_DEBUG
          value: false
        - key: CELERY_TASK_ALWAYS_EAGER
          value: true
        - key: CELERY_BROKER_URL
          value: memory://
        - key: CELERY_RESULT_BACKEND
          value: cache+memory://
        - key: JWT_SECRET_KEY
          value: change_me_super_secret
